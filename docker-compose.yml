services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-certi_nt}
      POSTGRES_USER: ${POSTGRES_USER:-certi_nt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-certi_nt}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
      - mailhog
    environment:
      ENV: ${ENV:-development}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-certi-nt-secret}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://certi_nt:certi_nt@postgres:5432/certi_nt}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      SETUP_TOKEN_EXPIRE_MINUTES: ${SETUP_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-false}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-noreply@certi.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-CERTI_nt System}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./docs/modules:/app/docs/modules:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  frontend_node_modules:
